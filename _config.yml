  name: Dionysius
  job: 
  bio: "Entrepreneur"
  thumb: /images/author.jpg
  email: 
  url: 
  github: 
  twitter: 
  facebook: 
  linkedin: 

# navbar pages
navbar:
  - slug: about
    title: About
  - slug: Services
    title: Services

exclude: ["config.rb", "src", "Gemfile", "Gemfile.lock", "package.json","README.md", "Rakefile"]
